#local docker-compose.yaml for netops-mcp-chat application
services:
  memory-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netops-memory-mcp
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - MEMORY_MCP_URL=http://memory-mcp:8002/mcp
  